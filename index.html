<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Στατιστικά Ολυμπιακού BC - EuroLeague">
    <title>Olympiacos BC - EuroLeague Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --olympiacos-red: #E30613;
            --dark-red: #c10512;
            --text-dark: #333;
            --text-light: #666;
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            --card-shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            text-align: center;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: var(--olympiacos-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 20px rgba(227, 6, 19, 0.3);
        }

        h1 {
            color: var(--olympiacos-red);
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 18px;
            margin-bottom: 10px;
        }

        .season-info {
            display: inline-block;
            background: #f0f0f0;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-dark);
            margin-top: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.15s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }
        .stat-card:nth-child(4) { animation-delay: 0.25s; }
        .stat-card:nth-child(5) { animation-delay: 0.3s; }
        .stat-card:nth-child(6) { animation-delay: 0.35s; }
        .stat-card:nth-child(7) { animation-delay: 0.4s; }
        .stat-card:nth-child(8) { animation-delay: 0.45s; }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-shadow-hover);
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: var(--olympiacos-red);
            font-size: 42px;
            font-weight: bold;
            line-height: 1;
        }

        .loading {
            background: white;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: var(--card-shadow);
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--olympiacos-red);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-dark);
            font-size: 18px;
        }

        .error {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 15px;
            padding: 30px;
            color: #856404;
            text-align: center;
            box-shadow: var(--card-shadow);
        }

        .error h2 {
            color: #856404;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .error p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .error-code {
            background: rgba(0, 0, 0, 0.05);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }

        .refresh-btn {
            background: var(--olympiacos-red);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(227, 6, 19, 0.3);
        }

        .refresh-btn:hover {
            background: var(--dark-red);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(227, 6, 19, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.9;
        }

        .footer a {
            color: white;
            text-decoration: underline;
        }

        .last-update {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            box-shadow: var(--card-shadow);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 26px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .stat-card {
                padding: 25px;
            }

            .stat-value {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Ο</div>
            <h1>ΟΛΥΜΠΙΑΚΟΣ Β.Κ.</h1>
            <p class="subtitle">Στατιστικά EuroLeague</p>
            <div class="season-info" id="seasonInfo">Φόρτωση σεζόν...</div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p class="loading-text">Φόρτωση στατιστικών...</p>
            </div>
        </div>

        <div class="footer">
            <p>Δεδομένα από Sofascore | Τελευταία ενημέρωση: <span id="lastUpdate">-</span></p>
            <p style="margin-top: 10px; font-size: 12px;">
                Made with ❤️ for Olympiacos BC fans
            </p>
        </div>
    </div>

    <script>
        // ΣΗΜΑΝΤΙΚΟ: Άλλαξε αυτό το URL με το URL του Cloudflare Worker σου
        const WORKER_URL = 'https://olympiacos-stats.st-gardelis.workers.dev';

        // Mapping icons για κάθε στατιστικό
        const statIcons = {
            pointsScored: '🏀',
            pointsAllowed: '🛡️',
            assists: '🤝',
            threePointers: '🎯',
            freeThrows: '🎪',
            offensiveRebounds: '⬆️',
            defensiveRebounds: '⬇️',
            totalRebounds: '📊'
        };

        // Mapping labels σε ελληνικά
        const statLabels = {
            pointsScored: 'Πόντοι ανά αγώνα',
            pointsAllowed: 'Πόντοι που δέχεται',
            assists: 'Ασίστ ανά αγώνα',
            threePointers: 'Τρίποντα ανά αγώνα',
            freeThrows: 'Ελεύθερες βολές',
            offensiveRebounds: 'Επιθετικά ριμπάουντ',
            defensiveRebounds: 'Αμυντικά ριμπάουντ',
            totalRebounds: 'Συνολικά ριμπάουντ'
        };

        async function fetchStats() {
            const contentDiv = document.getElementById('content');
            
            // Δείξε loading
            contentDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="loading-text">Φόρτωση στατιστικών...</p>
                </div>
            `;

            try {
                const response = await fetch(WORKER_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Ενημέρωση season info
                document.getElementById('seasonInfo').textContent = `Σεζόν ${data.season}`;

                // Ενημέρωση last update
                const updateTime = new Date(data.lastUpdate).toLocaleString('el-GR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                document.getElementById('lastUpdate').textContent = updateTime;

                // Δημιουργία stats grid
                let statsHTML = '<div class="stats-grid">';
                
                for (const [key, value] of Object.entries(data.statistics)) {
                    statsHTML += `
                        <div class="stat-card">
                            <div class="stat-icon">${statIcons[key] || '📈'}</div>
                            <div class="stat-label">${statLabels[key] || key}</div>
                            <div class="stat-value">${value}</div>
                        </div>
                    `;
                }
                
                statsHTML += '</div>';

                // Last update info
                statsHTML += `
                    <div class="last-update">
                        <button class="refresh-btn" onclick="fetchStats()">🔄 Ανανέωση Δεδομένων</button>
                    </div>
                `;

                contentDiv.innerHTML = statsHTML;

            } catch (error) {
                console.error('Error:', error);
                
                let errorMessage = error.message;
                let helpText = '';

                if (WORKER_URL.includes('YOUR-WORKER')) {
                    helpText = '⚠️ Δεν έχεις ρυθμίσει το URL του Cloudflare Worker!<br>Άνοιξε το index.html και άλλαξε το <code>WORKER_URL</code>';
                } else if (error.message.includes('Failed to fetch')) {
                    helpText = 'Το Cloudflare Worker μπορεί να μην είναι ενεργό ή το URL είναι λάθος.';
                }

                contentDiv.innerHTML = `
                    <div class="error">
                        <h2>⚠️ Σφάλμα Φόρτωσης</h2>
                        <p>${helpText}</p>
                        <div class="error-code">
                            <strong>Σφάλμα:</strong> ${errorMessage}
                        </div>
                        <p style="font-size: 13px; margin-top: 15px;">
                            Βεβαιώσου ότι:<br>
                            ✓ Έχεις δημιουργήσει το Cloudflare Worker<br>
                            ✓ Έχεις αλλάξει το WORKER_URL στον κώδικα<br>
                            ✓ Το Worker είναι deployed και ενεργό
                        </p>
                        <button class="refresh-btn" onclick="fetchStats()">Δοκίμασε ξανά</button>
                    </div>
                `;
            }
        }

        // Φόρτωση στατιστικών όταν ανοίγει η σελίδα
        window.addEventListener('DOMContentLoaded', fetchStats);

        // Auto-refresh κάθε 5 λεπτά (προαιρετικό)
        // setInterval(fetchStats, 5 * 60 * 1000);
    </script>
</body>
</html>
